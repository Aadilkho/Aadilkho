name: Build Android APK

on:
  push:
    branches:
      - claude/cariq-react-native-app-9JSgA
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-apk:
    name: Build Android APK (EAS cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS + Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS cloud
        env:
          BUILD_PROFILE: ${{ github.event.inputs.profile || 'preview' }}
        run: |
          BUILD_JSON=$(eas build \
            --platform android \
            --profile "$BUILD_PROFILE" \
            --non-interactive \
            --json 2>&1 | tail -1)

          BUILD_URL=$(echo "$BUILD_JSON" | jq -r '.[0].artifacts.buildUrl // empty' 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ] && [ "$BUILD_URL" != "null" ]; then
            echo "Downloading APK from EAS..."
            curl -L "$BUILD_URL" -o cariq.apk
            echo "APK saved to cariq.apk"
          else
            echo "Build submitted. Download APK at:"
            echo "https://expo.dev/accounts/aadilkho/projects/cariq/builds"
          fi

      - name: Upload APK artifact
        if: hashFiles('cariq.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cariq-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}
          path: ./cariq.apk
          retention-days: 30
