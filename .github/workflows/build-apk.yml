name: Build Android APK

on:
  push:
    branches:
      - claude/cariq-react-native-app-9JSgA
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-apk:
    name: Build Android APK (EAS)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS + Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --output ./cariq.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: cariq-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}
          path: ./cariq.apk
          retention-days: 30
          if-no-files-found: error
