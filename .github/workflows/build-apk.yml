name: Build Android APK

on:
  push:
    branches:
      - claude/cariq-react-native-app-9JSgA
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build-apk:
    name: Build Android APK (EAS cloud)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Setup EAS + Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS cloud and download artifact
        run: |
          echo "Submitting cloud build..."
          BUILD_JSON=$(eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --json 2>&1)

          echo "Build output: $BUILD_JSON"

          BUILD_URL=$(echo "$BUILD_JSON" | python3 -c "
import sys, json
raw = sys.stdin.read()
# Find the JSON object in the output
start = raw.find('{')
if start == -1:
    start = raw.find('[')
if start != -1:
    try:
        data = json.loads(raw[start:])
        if isinstance(data, list):
            data = data[0]
        print(data.get('artifacts', {}).get('buildUrl', ''))
    except:
        pass
" 2>/dev/null || echo "")

          if [ -n "$BUILD_URL" ]; then
            echo "Downloading APK from: $BUILD_URL"
            curl -L "$BUILD_URL" -o cariq.apk
            echo "APK downloaded successfully"
          else
            echo "Build submitted to EAS cloud."
            echo "Download your APK at: https://expo.dev/accounts/aadilkho/projects/cariq/builds"
          fi

      - name: Upload APK artifact
        if: hashFiles('cariq.apk') != ''
        uses: actions/upload-artifact@v4
        with:
          name: cariq-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}
          path: ./cariq.apk
          retention-days: 30
